"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
command_timeout = 1000

format = """$username$hostname $directory$git_branch$git_status$time
$character"""

# ══════════════════════════════════════════════════════════════════

[username]
show_always = true
format = "[$user]($style)"
style_user = "bold cyan"
style_root = "bold red"

[hostname]
ssh_only = false
format = "[@$hostname]($style)"
style = "bold green"
trim_at = "."

[directory]
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold cyan"
read_only = " 󰌾"
read_only_style = "red"
truncation_length = 4
truncate_to_repo = true
home_symbol = "~"
repo_root_style = "bold cyan"
repo_root_format = "[$before_root_path]($style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "🌿 [$branch]($style) "
style = "bold green"
symbol = ""
truncation_length = 30
truncation_symbol = "…"

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "bold yellow"
conflicted = "⚡"
ahead = "⬆${count}"
behind = "⬇${count}"
diverged = "⬆${ahead_count}⬇${behind_count}"
up_to_date = "✔"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✗"

[time]
disabled = false
format = "🕒 [$time]($style)"
style = "fg:#888888"
time_format = "%I:%M %p"
use_12hr = true

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# ── Disabled ──────────────────────────────────────────────────────
[os]
disabled = true
[shlvl]
disabled = true
[nodejs]
disabled = true
[python]
disabled = true
[rust]
disabled = true
[golang]
disabled = true
[docker_context]
disabled = true
[kubernetes]
disabled = true
[aws]
disabled = true
[jobs]
disabled = true
[status]
disabled = true
[cmd_duration]
disabled = true
[git_state]
disabled = true
[line_break]
disabled = false