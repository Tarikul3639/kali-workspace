"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
command_timeout = 1000

format = """
$username$hostname $directory$git_branch$git_status$battery $time
$character"""

# ───────────────────────────────────────────────────────────────

[username]
show_always = true
format = "[$user]($style)"
style_user = "bold cyan"
style_root = "bold red"

[hostname]
ssh_only = false
format = "[@$hostname ]($style)"
style = "bold green"
trim_at = "."

[directory]
style = "bold blue"
format = "[$path]($style) "
home_symbol = "~"
truncation_length = 3
truncate_to_repo = true
read_only = "󰌾"
read_only_style = "bold red"

[git_branch]
symbol = "🌿 "
format = "$symbol[$branch]($style) "
style = "bold green"

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "bold yellow"
up_to_date = "✔"
modified = "!"
staged = "+"
untracked = "?"
deleted = "✗"
renamed = "»"
stashed = "$"
ahead = "⬆${count}"
behind = "⬇${count}"
diverged = "⬆${ahead_count}⬇${behind_count}"
conflicted = "⚡"

[battery]
disabled = false
format = "[$symbol $percentage]($style) "

full_symbol = "🔋"
charging_symbol = "⚡"
discharging_symbol = "🔋"
unknown_symbol = "?"
empty_symbol = "🪫"

[[battery.display]]
threshold = 100
style = "bold green"

[[battery.display]]
threshold = 50
style = "bold yellow"

[[battery.display]]
threshold = 15
style = "bold red"

[time]
disabled = false
format = "🕒 [$time]($style)"
style = "bright-black"
time_format = "%I:%M %p"
use_12hr = true

[character]
success_symbol = "[❯](bold green) "
error_symbol = "[❯](bold red) "

# Disable unused modules
[os]
disabled = true

[shlvl]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[docker_context]
disabled = true

[kubernetes]
disabled = true

[aws]
disabled = true

[jobs]
disabled = true

[status]
disabled = true

[cmd_duration]
disabled = true

[git_state]
disabled = true